<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign In to Court Compass</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-card" aria-labelledby="signinTitle">
        <a class="auth-logo-link" href="./index.html" aria-label="Back to Court Compass">
          <img class="auth-logo" src="./assets/court-compass-logo.png" alt="Court Compass" />
        </a>

        <div class="auth-heading">
          <h1 id="signinTitle">Welcome Back</h1>
          <p>Sign in to continue finding basketball tournaments.</p>
        </div>

        <form class="auth-form" id="signinForm">
          <label>
            Email
            <input name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
          </label>

          <label>
            Password
            <input name="password" type="password" autocomplete="current-password" placeholder="Enter your password" required />
          </label>

          <button class="auth-submit" type="submit">Sign In</button>
          <p class="auth-message" id="signinMessage" role="status"></p>
        </form>

        <p class="auth-switch">Need an account? <a href="./signup.html">Create one here</a></p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script src="./signup.js"></script>
  </body>
</html>
