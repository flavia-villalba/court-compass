<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Join Court Compass</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-card" aria-labelledby="signupTitle">
        <a class="auth-logo-link" href="./index.html" aria-label="Back to Court Compass">
          <img class="auth-logo" src="./assets/court-compass-logo.png" alt="Court Compass" />
        </a>

        <div class="auth-heading">
          <h1 id="signupTitle">Join Court Compass</h1>
          <p>Create your account to access premium basketball tournaments.</p>
        </div>

        <form class="auth-form" id="signupForm">
          <label>
            Full Name
            <input name="fullName" autocomplete="name" placeholder="Enter your full name" required />
          </label>

          <label>
            Email
            <input name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
          </label>

          <label>
            Password
            <input name="password" type="password" autocomplete="new-password" placeholder="Create a password" minlength="8" required />
          </label>

          <button class="auth-submit" type="submit">Create Account</button>
          <p class="auth-message" id="signupMessage" role="status"></p>
        </form>

        <p class="auth-switch">Already have an account? <a href="./signin.html">Sign in here</a></p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script src="./signup.js"></script>
  </body>
</html>
